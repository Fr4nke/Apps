name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Write config
        run: |
          cat > 24h-secret-android/app/src/main/java/no/secret24h/data/Config.kt << 'EOF'
          package no.secret24h.data

          object Config {
              const val SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
              const val SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}"
              const val GOOGLE_WEB_CLIENT_ID = "${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          }
          EOF

      - name: Restore debug keystore
        run: |
          mkdir -p ~/.android
          mkdir -p $HOME/.android
          mkdir -p $ANDROID_USER_HOME 2>/dev/null || true
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > /tmp/debug.keystore
          # Copy to ALL possible locations
          cp /tmp/debug.keystore ~/.android/debug.keystore
          cp /tmp/debug.keystore $HOME/.android/debug.keystore
          if [ -n "$ANDROID_USER_HOME" ]; then cp /tmp/debug.keystore $ANDROID_USER_HOME/debug.keystore; fi
          echo "ANDROID_USER_HOME: $ANDROID_USER_HOME"
          echo "HOME: $HOME"
          echo "Files:"
          find / -name "debug.keystore" 2>/dev/null | head -20
          echo "Our keystore SHA-1 (should match Google Cloud):"
          keytool -list -v -keystore /tmp/debug.keystore -storepass android 2>&1 | grep -i "sha1:"

      - name: Build debug APK
        working-directory: 24h-secret-android
        run: gradle assembleDebug

      - name: Get version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp 24h-secret-android/app/build/outputs/apk/debug/app-debug.apk \
             "release/24h-secret-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "24h Secret ${{ steps.version.outputs.tag }}"
          body: "Automatisk bygget fra main-branch."
          files: "release/24h-secret-${{ steps.version.outputs.tag }}.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
