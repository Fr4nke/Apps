name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Write config
        run: |
          cat > 24h-secret-android/app/src/main/java/no/secret24h/data/Config.kt << 'EOF'
          package no.secret24h.data

          object Config {
              const val SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
              const val SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}"
              const val GOOGLE_WEB_CLIENT_ID = "${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          }
          EOF

      - name: Build debug APK
        working-directory: 24h-secret-android
        run: gradle assembleDebug

      - name: Get version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp 24h-secret-android/app/build/outputs/apk/debug/app-debug.apk \
             "release/24h-secret-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "24h Secret ${{ steps.version.outputs.tag }}"
          body: "Automatisk bygget fra main-branch."
          files: "release/24h-secret-${{ steps.version.outputs.tag }}.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
